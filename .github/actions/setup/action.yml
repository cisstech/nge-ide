name: Setup
description: Check out dependencies with Corepack-managed Yarn and an immutable install

inputs:
  node-version:
    description: Node.js version to install
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Install dependencies
      shell: bash
      run: yarn install --immutable
