name: Setup
description: Check out dependencies with Corepack-managed Yarn and an immutable install

inputs:
  node-version:
    description: Node.js version to install
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        # Yarn is Corepack-managed and enabled in the next step; setup-node's own
        # dependency cache probes yarn too early (global yarn 1 vs packageManager
        # yarn 4) and fails, so leave it off. Yarn's global cache covers this.
        package-manager-cache: false

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Install dependencies
      shell: bash
      run: yarn install --immutable
