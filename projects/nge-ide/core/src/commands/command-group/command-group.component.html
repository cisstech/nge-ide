@if (commands) {
  @for (command of commands; track command.id) {
    @if (command.enabled) {
      <div
        class="command"
        role="button"
        [attr.command-id]="command.id"
        [ideTooltip]="command.label"
        (click)="_execute(command, $event)"
      >
        <ui-icon [icon]="command.icon"></ui-icon>
      </div>
    }
  }
}
